name: SnappyMail
version: "1.0.1"
slug: snappymail
description: Simple, modern & fast web-based email client. Supports multiple accounts including Gmail.
url: https://github.com/gregorwolf1973/snappymail-addon
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: true
ingress_port: 8888
panel_icon: mdi:email
panel_title: SnappyMail
homeassistant_api: false
ports:
  8888/tcp: 8888
ports_description:
  8888/tcp: Web UI Port
options:
  admin_password: "changeme"
  web_port: 8888
  upload_max_size: "25M"
  memory_limit: "128M"
  log_to_stdout: false
schema:
  admin_password: str
  web_port: int
  upload_max_size: str
  memory_limit: str
  log_to_stdout: bool
map:
  - type: addon_config
    read_only: false
image: ghcr.io/gregorwolf1973/snappymail-addon/snappymail/{arch}
