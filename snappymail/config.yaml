name: SnappyMail
version: "1.3.1"
slug: snappymail
description: Simple, modern & fast web-based email client. Supports multiple accounts including Gmail.
url: https://github.com/gregorwolf1973/snappymail-addon
arch:
  - aarch64
  - amd64
  - armv7
init: false
ingress: false
panel_icon: mdi:email
panel_title: SnappyMail
homeassistant_api: false
ports:
  8889/tcp: 8889
ports_description:
  8889/tcp: SnappyMail Web UI
options:
  admin_password: "changeme"
  web_port: 8889
  upload_max_size: "25M"
  memory_limit: "128M"
  imap_host: "172.30.33.22"
  imap_port: 993
  smtp_host: "172.30.33.22"
  smtp_port: 587
  domain: "yourdomain.com"
  gmail_address: "your@gmail.com"
  gmail_password: "your-app-password"
  gmail_alias_password: "your-alias-password"
schema:
  admin_password: str
  web_port: int
  upload_max_size: str
  memory_limit: str
  imap_host: str
  imap_port: int
  smtp_host: str
  smtp_port: int
  domain: str
  gmail_address: str
  gmail_password: str
  gmail_alias_password: str
map:
  - type: addon_config
    read_only: false
image: ghcr.io/gregorwolf1973/snappymail-addon/snappymail/{arch}
