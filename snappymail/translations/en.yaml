configuration:
  admin_password:
    name: Admin Passwort
    description: Passwort für das SnappyMail Admin-Panel. Bitte sofort ändern!
  web_port:
    name: Web Port
    description: Port auf dem SnappyMail läuft (z.B. 8889 wenn 8888 belegt ist)
  upload_max_size:
    name: Max. Anhang Größe
    description: Maximale Größe für E-Mail Anhänge (z.B. 25M, 50M)
  memory_limit:
    name: PHP Speicherlimit
    description: PHP Speicherlimit (z.B. 128M, 256M)
  log_to_stdout:
    name: Logging aktivieren
    description: Logs im Home Assistant Log-Viewer anzeigen
